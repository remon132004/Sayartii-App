name: sayartii
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  bloc: ^9.2.0
  http: ^1.6.0

  # Bluetooth serial - patched locally to fix Android "read failed, socket might closed" bug
  flutter_bluetooth_serial:
    path: packages/flutter_bluetooth_serial

  math_expressions: ^3.1.0
  permission_handler: ^12.0.1
  flutter_bloc: ^9.1.1
  sizer: ^3.1.3
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.3
  flutter_switch: ^0.3.2
  flutter_phoenix: ^1.1.1
  flutter_login: ^6.0.0
  another_flutter_splash_screen: ^1.2.1
  dio: ^5.9.1
  smooth_page_indicator: ^2.0.1
  flutter_secure_storage: ^10.0.0

  rxdart: ^0.27.7
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  fancy_bottom_navigation: ^0.3.3
  flutter_background: ^1.3.1
  geolocator: ^13.0.4
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  flutter_native_splash: ^2.4.4
  animate_do: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/Sayartii_processed.png"
  adaptive_icon_background: "#F7F9FC"
  adaptive_icon_foreground: "assets/icons/Sayartii_processed.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#F7F9FC"
  image: "assets/icons/Sayartii_processed.png"
  android_12:
    image: "assets/icons/Sayartii_processed.png"
    icon_background_color: "#F7F9FC"
    color: "#F7F9FC"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/ca/
    
  fonts:
    - family: MyFlutterApp
      fonts:
        - asset: assets/icons/MyFlutterApp.ttf