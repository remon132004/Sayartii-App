name: sayartii
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  bloc: ^9.2.0
  http: ^1.6.0

  # Bluetooth serial (ملاحظة: لو هتعمله patch محلي هنغيره لـ path)
  flutter_bluetooth_serial: ^0.4.0

  math_expressions: ^3.1.0
  permission_handler: ^12.0.1
  flutter_bloc: ^9.1.1
  sizer: ^3.1.3
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.3
  flutter_switch: ^0.3.2
  flutter_phoenix: ^1.1.1
  flutter_login: ^6.0.0
  another_flutter_splash_screen: ^1.2.1
  dio: ^5.9.1
  smooth_page_indicator: ^2.0.1
  flutter_secure_storage: ^10.0.0

  rxdart: ^0.27.7
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  fancy_bottom_navigation: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/ca/
    
  fonts:
    - family: MyFlutterApp
      fonts:
        - asset: assets/icons/MyFlutterApp.ttf